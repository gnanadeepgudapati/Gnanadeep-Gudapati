<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Background Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    /* Vignette — fades edges into the bg colour so the
       hex grid looks like it stretches infinitely */
    #hex-vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(to right,  #141413 0%, transparent 18%, transparent 82%, #141413 100%),
        linear-gradient(to bottom, #141413 0%, transparent 22%);
    }
  </style>
</head>
<body>
  <div id="hex-vignette"></div>
  <script src="./three.min.js"></script>
  <script src="./hex-background.js"></script>
</body>
</html>
